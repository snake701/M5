<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mei Yang 美揚日系手作飾品 | 官方網站</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        wood: {
                            base: '#FCF9F5',    /* 溫潤和紙白 */
                            dark: '#4A3728',    /* 深胡桃木 */
                            medium: '#8C7662',  /* 橡木棕 */
                            accent: '#A67B5B',  /* 焦糖木色 */
                            moss: '#76885B',    /* 苔蘚綠（點綴） */
                            line: '#E7DED0',    /* 木質線條 */
                            bg: '#F3EEEA',      /* 淺米色底 */
                            hover: '#FAF7F2',   /* 懸停背景 */
                            card: '#FFFFFF'     
                        }
                    },
                    fontFamily: {
                        sans: ['Noto Sans TC', 'sans-serif'],
                        serif: ['Noto Serif TC', 'serif'],
                    },
                    boxShadow: {
                        'paper': '0 10px 40px -6px rgba(74, 55, 40, 0.12)',
                        'glow': '0 0 15px rgba(166, 123, 91, 0.15)',
                        'card': '0 4px 15px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>
    <style>
        html, body {
            width: 100%;
            max-width: 100%;
            overflow-x: hidden;
            position: relative;
            touch-action: pan-y;
            -webkit-overflow-scrolling: touch;
        }
        
        body {
            background-color: #F3EEEA;
            /* 背景加上淡淡的木質紋理感 */
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(118, 136, 91, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(166, 123, 91, 0.05) 0%, transparent 40%);
        }
        
        .flower { position: absolute; pointer-events: none; z-index: 50; top: -10vh; }
        @keyframes fall-1 { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 10% { opacity: var(--opacity-val); } 90% { opacity: var(--opacity-val); } 100% { transform: translate(10vw, 110vh) rotate(360deg); opacity: 0; } }
        @keyframes fall-2 { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 10% { opacity: var(--opacity-val); } 90% { opacity: var(--opacity-val); } 100% { transform: translate(-10vw, 110vh) rotate(-180deg); opacity: 0; } }
        @keyframes fall-3 { 0% { transform: translate(0, 0) rotate(0deg); opacity: 0; } 10% { opacity: var(--opacity-val); } 50% { transform: translate(5vw, 55vh) rotate(90deg); } 90% { opacity: var(--opacity-val); } 100% { transform: translate(-5vw, 110vh) rotate(180deg); opacity: 0; } }

        .washi-card {
            background-color: #FCF9F5;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M11 18c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm48 25c3.866 0 7-3.134 7-7s-3.134-7-7-7-7 3.134-7 7 3.134 7 7 7zm-43-7c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm63 31c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zM34 90c1.657 0 3-1.343 3-3s-1.343-3-3-3-3 1.343-3 3 1.343 3 3 3zm56-76c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zM12 86c1.105 0 2-.895 2-2s-.895-2-2-2-2 .895-2 2 .895 2 2 2zm76-52c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm-6 46c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM42 2c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zm54 71c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM68 8c.552 0 1-.448 1-1s-.448-1-1-1-1 .448-1 1 .448 1 1 1zM15.5 1.1c-.003 0-.005 0-.008 0z' fill='%238c7662' fill-opacity='0.02' fill-rule='evenodd'/%3E%3C/svg%3E");
        }

        @keyframes sway { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        .animate-sway { animation: sway 6s ease-in-out infinite; transform-origin: center center; }

        #lightbox { transition: opacity 0.3s ease, visibility 0.3s ease; }
        #lightbox.hidden-box { opacity: 0; visibility: hidden; pointer-events: none; }
        #lightbox.visible-box { opacity: 1; visibility: visible; pointer-events: auto; }
    </style>
</head>
<body class="text-wood-dark min-h-screen font-serif relative selection:bg-wood-accent selection:text-white">

    <div class="w-full overflow-x-hidden min-h-screen flex flex-col items-center justify-center py-4 md:py-8 px-2 md:px-4 relative">
        <div id="flower-container" class="fixed inset-0 pointer-events-none z-50 overflow-hidden w-full h-full"></div>

        <main class="w-[96%] max-w-[540px] md:w-full md:max-w-4xl min-h-[85vh] md:min-h-[600px] md:h-auto bg-wood-base washi-card shadow-paper relative flex flex-col md:flex-row md:items-stretch md:gap-10 p-6 md:p-14 z-10 border border-wood-line transition-all duration-500 mx-auto rounded-sm md:rounded-none overflow-hidden md:overflow-visible">
            
            <div class="absolute top-4 left-4 w-8 h-8 border-t border-l border-wood-accent/20"></div>
            <div class="absolute top-4 right-4 w-8 h-8 border-t border-r border-wood-accent/20"></div>
            <div class="absolute bottom-4 left-4 w-8 h-8 border-b border-l border-wood-accent/20"></div>
            <div class="absolute bottom-4 right-4 w-8 h-8 border-b border-r border-wood-accent/20"></div>

            <div class="flex flex-col items-center md:w-[38%] md:border-r md:border-wood-line md:pr-10 md:h-auto shrink-0 relative">
                <div class="md:sticky md:top-10 flex flex-col items-center w-full">
                    <header class="flex flex-col items-center mb-6 md:mb-0 relative">
                        <div class="relative mb-5">
                            <svg class="absolute -top-4 -left-4 w-40 h-40 text-wood-accent animate-sway opacity-30 pointer-events-none" viewBox="0 0 100 100">
                                <circle cx="50" cy="50" r="46" fill="none" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,6" />
                            </svg>
                            
                            <div class="w-32 h-32 rounded-full overflow-hidden border-2 border-wood-line p-1 bg-white relative z-10 shadow-md">
                                <img src="S__153395212.jpg" 
                                    onerror="this.src='https://images.unsplash.com/photo-1602157731778-9d62d2946c64?q=80&w=400&auto=format&fit=crop'"
                                    alt="Mei Yang Logo" 
                                    class="w-full h-full object-cover rounded-full">
                            </div>
                        </div>
                        
                        <h1 class="text-xl md:text-2xl font-bold tracking-[0.15em] text-wood-dark mt-2 text-center leading-relaxed">
                            Mei Yang<br>美揚日系手作飾品
                        </h1>
                        <p class="text-[11px] md:text-xs text-wood-medium font-medium mt-2 tracking-[0.2em] uppercase font-sans text-center">Botanical & Accessory</p>
                        
                        <div class="flex items-center gap-3 mt-5">
                            <a href="https://www.instagram.com/meiyang.16888" target="_blank" class="p-2 border border-wood-accent/30 rounded-full text-wood-accent hover:bg-wood-accent hover:text-white transition-all duration-300">
                                <i data-lucide="instagram" class="w-4 h-4"></i>
                            </a>
                            <a href="mailto:your-email@example.com" class="p-2 border border-wood-accent/30 rounded-full text-wood-accent hover:bg-wood-accent hover:text-white transition-all duration-300">
                                <i data-lucide="mail" class="w-4 h-4"></i>
                            </a>
                        </div>
                    </header>
                </div>
            </div>

            <div class="flex flex-col md:w-[62%] w-full md:pl-2 pt-6 md:pt-0">
                <section class="text-center md:text-left space-y-6">
                    <div class="space-y-4">
                        <div class="flex items-center gap-3 mb-2 justify-center md:justify-start">
                            <span class="text-[10px] tracking-[0.2em] text-wood-accent font-bold uppercase border-b border-wood-accent/30 pb-0.5">Brand Story</span>
                        </div>
                        <p class="text-[13px] md:text-[14px] leading-7 tracking-wide text-wood-dark font-medium text-justify font-sans">
                            以「花」為手作的出發點，把花最美的姿態永久保存。利用工藝樹脂、不凋花、乾燥花，搭配異素材，呈現獨特清新感。期待「Mei Yang」能帶給妳喜悅，成為精緻生活中的一部份。
                        </p>
                    </div>

                    <div class="pt-4 border-t border-wood-line/60 border-dashed">
                        <div class="flex flex-col md:flex-row gap-4 md:gap-8">
                            <div class="flex-1">
                                <span class="block text-[10px] text-wood-medium font-bold tracking-widest mb-2 uppercase">Features</span>
                                <div class="flex flex-wrap gap-1.5 justify-center md:justify-start">
                                    <span class="px-2 py-0.5 bg-wood-accent/5 border border-wood-accent/20 text-wood-medium text-[10px] rounded-[2px]">#手工製作</span>
                                    <span class="px-2 py-0.5 bg-wood-accent/5 border border-wood-accent/20 text-wood-medium text-[10px] rounded-[2px]">#日式職人</span>
                                </div>
                            </div>
                            <div class="flex-1">
                                <span class="block text-[10px] text-wood-medium font-bold tracking-widest mb-2 uppercase">Items</span>
                                <ul class="flex flex-wrap gap-x-3 gap-y-1 justify-center md:justify-start text-[11px] text-wood-dark font-medium">
                                    <li class="flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-wood-accent"></span>耳環</li>
                                    <li class="flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-wood-accent"></span>項鍊</li>
                                    <li class="flex items-center gap-1"><span class="w-1 h-1 rounded-full bg-wood-accent"></span>髮飾</li>
                                </ul>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3 mt-4">
                        <a href="https://www.instagram.com/meiyang.16888" target="_blank" class="group border border-wood-line bg-white/50 hover:bg-white hover:border-wood-accent/50 p-3 rounded-sm transition-all duration-300">
                            <div class="flex flex-col items-center md:items-start">
                                <div class="flex items-center gap-2 mb-1.5 text-wood-accent">
                                    <i data-lucide="sparkles" class="w-3.5 h-3.5"></i>
                                    <h5 class="text-[11px] font-bold tracking-wider text-wood-dark">客製化訂製</h5>
                                </div>
                                <p class="text-[10px] text-wood-medium/80">私訊 IG 討論專屬款式</p>
                            </div>
                        </a>

                        <a href="mailto:your-email@example.com" class="group border border-wood-line bg-white/50 hover:bg-white hover:border-wood-moss/50 p-3 rounded-sm transition-all duration-300">
                            <div class="flex flex-col items-center md:items-start">
                                <div class="flex items-center gap-2 mb-1.5 text-wood-moss">
                                    <i data-lucide="mail-open" class="w-3.5 h-3.5"></i>
                                    <h5 class="text-[11px] font-bold tracking-wider text-wood-dark">合作邀約</h5>
                                </div>
                                <p class="text-[10px] text-wood-medium/80">商業合作與寄售聯繫</p>
                            </div>
                        </a>
                    </div>
                </section>

                <section class="w-full mt-auto pt-5 border-t border-wood-line/30">
                    <div class="flex items-center gap-3 mb-4 justify-center opacity-80">
                        <div class="h-[1px] w-8 bg-wood-line"></div>
                        <span class="text-[10px] tracking-[0.2em] text-wood-accent font-bold uppercase">Portfolio</span>
                        <div class="h-[1px] w-8 bg-wood-line"></div>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-2">
                        <div class="col-span-2 aspect-square bg-white p-1 border border-wood-line rounded-sm group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)">
                            <img src="product_01.png" onerror="this.src='https://images.unsplash.com/photo-1611591437281-460bfbe1220a?q=80&w=800&auto=format&fit=crop'" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>
                        <div class="col-span-2 aspect-square bg-white p-1 border border-wood-line rounded-sm group overflow-hidden cursor-zoom-in" onclick="openLightbox(this)">
                            <img src="product_02.png" onerror="this.src='https://images.unsplash.com/photo-1630019852942-e5b1216f3165?q=80&w=800&auto=format&fit=crop'" class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
                        </div>
                    </div>
                </section>

                <footer class="mt-6 flex justify-center md:justify-end">
                    <p class="text-[9px] text-wood-medium/50 tracking-[0.2em] font-sans">
                        © 2024 Mei Yang 美揚日系手作飾品
                    </p>
                </footer>
            </div>
        </main>
    </div>

    <div id="lightbox" class="fixed inset-0 z-[100] bg-wood-dark/80 backdrop-blur-sm hidden-box flex items-center justify-center p-4" onclick="closeLightbox()">
        <div class="relative max-w-2xl w-full flex justify-center" onclick="event.stopPropagation()">
            <div class="bg-white p-2 shadow-2xl rounded-sm">
                <img id="lightbox-img" src="" class="max-w-full max-h-[80vh] object-contain">
                <button onclick="closeLightbox()" class="absolute -top-10 right-0 text-white">
                    <i data-lucide="x" class="w-8 h-8"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 確保在頁面加載後初始化圖示
        document.addEventListener('DOMContentLoaded', function() {
            lucide.createIcons();
            createFlowers();
        });

        function createFlowers() {
            const container = document.getElementById('flower-container');
            if(!container) return;
            const flowerCount = 8;
            for (let i = 0; i < flowerCount; i++) {
                const flower = document.createElement('div');
                flower.classList.add('flower');
                flower.innerHTML = `<svg viewBox="0 0 100 100" fill="currentColor" class="w-full h-full"><path d="M50 50 C40 80 10 70 20 50 C10 30 40 20 50 50 C60 20 90 30 80 50 C90 70 60 80 50 50 Z" opacity="0.6"/></svg>`;
                const size = Math.random() * 10 + 10 + 'px';
                flower.style.width = size;
                flower.style.height = size;
                flower.style.left = Math.random() * 95 + 'vw';
                flower.style.animationDuration = (Math.random() * 5 + 10) + 's';
                flower.style.animationName = `fall-${Math.floor(Math.random() * 3) + 1}`;
                flower.style.color = ['#E7DED0', '#A67B5B', '#FCF9F5'][Math.floor(Math.random() * 3)];
                flower.style.setProperty('--opacity-val', (Math.random() * 0.2 + 0.2).toString());
                container.appendChild(flower);
            }
        }

        function openLightbox(element) {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = element.querySelector('img').src;
            lightbox.classList.remove('hidden-box');
            lightbox.classList.add('visible-box');
        }

            function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.add('hidden-box');
            lightbox.classList.remove('visible-box');
        }
    </script>
</body>
</html>
